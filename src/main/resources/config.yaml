baseUrl: https://issues.apache.org/jira

projects:

  - key: OPENJPA
    jql: "issuetype = Bug AND status in (Closed, Resolved) AND resolution = Fixed"

git:
  cloneUrl: https://github.com/apache/openjpa.git
  repoDir: gitclones/openjpa
  codeOutputDir: output/milestone1/6_extracted_source

csv:
  outputDir: output/milestone1
  issueColumns:
    key: true
    summary: false
    created: true
    openingVersion: true
    fixVersions: true
    affectedVersions: true
  versionColumns:
    name: true
    releaseDate: true
    released: true

metrics:
  # 1.0 = tutti gli snapshot; valori minori (es. 0.1) per debug rapido
  snapshotPercentage: 1.0
  pmd:
    batchSize: 100    # file per invocazione PMD (meno = meno RAM, più = meno overhead di init)
    cpuFraction: 0.5  # frazione dei core usati dai thread PMD

classifier:
  inputCsv: "output/milestone1/5_snapshots/OPENJPA_snapshots.csv"
  outputDir: "output/milestone2"
  datasetName: "OPENJPA"

  # Tempi misurati (OpenJPA, 15k istanze, 10x10 CV, rfSlots=1, NONE FS, NONE balancing):
  #   RF=757s  IBk=227s  NB=6s
  # Con 4 thread il wall time scende ~4x. I metodi wrapper aggiungono ~1-3h per combinazione.

  classifiers:
    - RANDOM_FOREST
    - NAIVE_BAYES
    - IBK

  featureSelection:
    - NONE
    - INFO_GAIN
    - SPEARMAN
    # Metodi wrapper: molto lenti (ricerca GreedyStepwise, ~1-3h per combinazione)
    - FORWARD_SEARCH
    - BACKWARD_SEARCH

  balancing:
    - NONE
    - UNDERSAMPLING
    - OVERSAMPLING
    - SMOTE

  crossValidation:
    runs: 10
    folds: 10

  # Classificatore base usato internamente dai metodi wrapper (ForwardSearch / BackwardSearch).
  # NaiveBayes è l'unica scelta praticabile: RF renderebbe la ricerca impraticabilmente lenta.
  wrapperBaseClassifier: NAIVE_BAYES

  # Due livelli di parallelismo indipendenti; il loro prodotto non deve superare i core fisici.
  # combinations: quante combinazioni (clf x FS x balancing) girano in parallelo.
  # randomForestSlots: thread interni di RF per la costruzione degli alberi (ininfluente su NB e IBk).
  # Formati: "auto", intero (es. "4"), percentuale (es. "50%").
  # interactive: true = chiede i valori a runtime; false = usa quelli sotto.
  parallelism:
    interactive: false
    combinations: "auto"
    randomForestSlots: "auto"

whatif:
  inputCsv: "output/milestone1/5_snapshots/OPENJPA_snapshots.csv"
  outputDir: "output/milestone3"
  datasetName: "OPENJPA"
  bestClassifier: "RANDOM_FOREST"
  bestFs: "NONE"
  bestBalancing: "SMOTE"
  smellsColumn: "Previous_Release_Code_Smells"

refactoring:
  outputDir: "output/milestone4"
  extractedSourceDir: "output/milestone4/source"
  lastRelease: "4.1.1"
  smallClassLocThreshold: 100  # classi con LOC < soglia escluse come troppo piccole
  minSmellsThreshold: 10       # classi con Nsmells < soglia escluse
  # nome Giordano -> G = 7a lettera -> X = 7 mod 5 = 2 -> rank (X+1) e rank (N-X)
  selectionX: 2
  inputCsv: "output/milestone1/5_snapshots/OPENJPA_snapshots.csv"
  refactoredClassesDir: "classi_refactored"
